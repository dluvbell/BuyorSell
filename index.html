<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전술 포트폴리오 관제소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #111827; color: #ffffff; }
        /* 입력창 숫자 올림/내림 화살표 숨기기 */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body class="min-h-screen p-6 font-sans">
    <div class="max-w-7xl mx-auto">
        
        <div class="flex justify-between items-end border-b border-gray-700 pb-4 mb-8">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-white">전술 포트폴리오 관제소</h1>
                <p class="text-gray-400 text-sm mt-1 font-mono">Real-time Tactical Allocation System</p>
            </div>
            <div class="text-right">
                <div class="text-xs text-gray-500 font-mono">Last Sync (GitHub)</div>
                <div id="last-updated" class="text-sm font-bold text-cyan-400 font-mono">데이터 동기화 중...</div>
            </div>
        </div>

        <div id="crypto-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
