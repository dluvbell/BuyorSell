name: Update Swing Dashboard Data

on:
  schedule:
    # 월~금(1-5), UTC 14시~22시까지 2시간 간격 실행 (토론토 EST/EDT 장중 및 마감 완벽 대응)
    - cron: '0 14-22/2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run update script
      run: python update_data.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add dashboard_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data" && git push)

    - name: Trigger Pages rebuild
      run: |
        curl -L -X POST -H "Accept: application/vnd.github+json" \
        -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
        -H "X-GitHub-Api-Version: 2022-11-28" \
        https://api.github.com/repos/${{ github.repository }}/pages/builds
