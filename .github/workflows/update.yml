name: Update Swing Dashboard Data

on:
  schedule:
    # 월~금(1-5), UTC 12시~20시 사이 매 12분, 42분 
    # (EDT/현지 기준 오전 8:12, 8:42 ~ 오후 4:12, 4:42 실행)
    - cron: '12,42 12-20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run update script
      run: python update_data.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add dashboard_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data" && git push)